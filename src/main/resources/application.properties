spring.application.name=Talabaty
spring.datasource.url=jdbc:postgresql://localhost:5432/talabaty
spring.datasource.username=postgres
spring.datasource.password=123456789
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.id.uuid_generator_strategy=org.hibernate.id.uuid.StandardRandomStrategy

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
# JWT Configuration
jwt.secret=your-secret-key-change-in-production-min-256-bits-this-is-a-very-long-secret-key-for-hmac-sha256-algorithm-please-change-in-production
jwt.access-token-expiration=3600
jwt.refresh-token-expiration=86400

# Server Configuration
server.port=8080

# File Upload Configuration
file.upload-dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# WhatsApp: use either Twilio (paid) OR local bridge (free, see docs/WHATSAPP-FREE-SETUP.md)
