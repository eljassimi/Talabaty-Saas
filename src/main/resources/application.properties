youcan.oauth.token-url=https://api.youcan.shop/oauth/token
# Scopes: YouCan uses hyphen format (read-orders, edit-orders) not colon format (orders:read)
# Use * for all scopes, or specific scopes like: read-orders edit-orders
# Valid scopes: read-orders, edit-orders, delete-orders, etc.
youcan.oauth.scopes=*
 