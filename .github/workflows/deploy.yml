name: Deploy

on:
  push:
    branches: [main, master]
    paths:
      - "docker-compose.yml"
      - "Dockerfile"
      - "whatsapp-bridge/**"
      - "talabaty-frontend/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy-to-server:
    name: Deploy via SSH and Docker Compose
    runs-on: ubuntu-latest
    needs: []
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # This step assumes you already build & push Docker images from CI
      # (for example using the commented push-image job in ci.yml).
      # Here we simply connect to your server and run docker compose.

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Sync docker-compose and config to server
        run: |
          rsync -avz --delete \
            docker-compose.yml \
            deploy/ \
            $SSH_USER@$SSH_HOST:$REMOTE_APP_PATH/
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_APP_PATH: ${{ secrets.REMOTE_APP_PATH }}

      - name: Deploy with Docker Compose
        run: |
          ssh $SSH_USER@$SSH_HOST << 'EOF'
          cd $REMOTE_APP_PATH
          docker compose pull || true
          docker compose up -d --remove-orphans
          docker system prune -f
          EOF
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_APP_PATH: ${{ secrets.REMOTE_APP_PATH }}

      # Required secrets (set them in your GitHub repo settings):
      # - SSH_PRIVATE_KEY: private key that can SSH into your server
      # - SSH_HOST: server hostname or IP
      # - SSH_USER: SSH user (e.g. ubuntu)
      # - REMOTE_APP_PATH: path on server where the repo/app lives

